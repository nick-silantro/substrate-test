# types.yaml — Entity type definitions, groupings, and nature mapping
# Source of truth for what entity types exist and how they're categorized.
#
# Work Focus Principle:
#   Each work level centers on a single focus. If you can't express it
#   in one statement, it's probably multiple entities at that level.
#   - Ticket: one coherent output, one session, one agent (primary claiming surface)
#   - Task: optional sub-unit, agent-discretionary during execution
#   - Project/Campaign/Ops-stream: one endstate (what the world looks like when done)

types:
  pillar:
    grouping: "horizons"
    description: "A permanent asymptotic ideal that orients all decisions; never completable"

  mission:
    grouping: "horizons"
    description: "A time-bound directional bet designed to move closer to a pillar"

  milestone:
    grouping: "horizons"
    description: "A significant checkpoint on the path toward a horizon. Milestones are entities with their own lifecycle and strategic weight — use one when the checkpoint itself matters beyond the tickets that deliver it. A milestone can be tracked, celebrated, reported on, and referenced by future work. If the checkpoint is just a date on a plan, it doesn't need to be a milestone."

  task:
    grouping: "actions"
    description: "An optional sub-unit of a ticket, created at an agent's discretion during execution — for internal tracking or to leave a record for future agents. Not the primary claiming surface."

  chore:
    grouping: "actions"
    description: "A standalone personal task, typically recurring"

  ticket:
    grouping: "actions"
    description: "The primary work unit — one coherent piece of work that produces a single reviewable output. Sized so one agent can complete it in one session."

  project:
    grouping: "efforts"
    description: "A goal-oriented container for tickets, documents, decisions, and context — time-boxed or open-ended, change-focused or ongoing"

  workstream:
    grouping: "efforts"
    description: "A renewable project subtype that carries SLO floors and absorbs BAU work (run)"

  incident:
    grouping: "efforts"
    description: "A short emergency project subtype to restore service (restore)"

  inquiry:
    grouping: "planning"
    description: "A tracked open investigation seeking understanding; may or may not lead to a decision"

  idea:
    grouping: "planning"
    description: "A possibility worth considering — a thesis about something that could be built, pursued, or explored"

  decision:
    grouping: "planning"
    description: "A settled conclusion that governs how something is built, run, or understood — the deliberative record of what was weighed and why. Works for any domain: system architecture, product, process, or personal."

  trigger:
    grouping: "utility"
    description: "An active mechanism that fires actions in response to events"

  skill:
    grouping: "utility"
    description: "A formalized instructional recipe that tells an agent how to perform a class of tasks — invokable by name, scoped globally or to Substrate, and maintained as a first-class capability"

  context-doc:
    grouping: "utility"
    description: "A living operational document that shapes how agents understand and operate within the workspace — context stack files, reference docs, and system guides. Routed to agents by audience and domain attributes, not hardcoded paths."

  person:
    grouping: "actors"
    description: "Someone you reference — biographical, relational, a node in the knowledge graph; persons don't do work in Substrate, they're represented in it"

  user:
    grouping: "actors"
    description: "A human who operates within Substrate — assignable to work, trackable, present; the participation side of a human actor"

  agent:
    grouping: "actors"
    description: "An AI actor that operates within Substrate — assignable to work, has a heartbeat, claims tasks via stigmergy"

  organization:
    grouping: "actors"
    description: "A company, team, or group"

  note:
    grouping: "knowledge"
    description: "A freeform captured thought"

  quote:
    grouping: "knowledge"
    description: "A verbatim extract from an external source, attributed to a person or organization. Different from a note in that it is someone else's words, not yours. Content goes in quote.md; source is linked via comes_from; speaker via attributed_to."

  document:
    grouping: "knowledge"
    description: "Formal written content"

  reference:
    grouping: "knowledge"
    description: "An external resource consumed and retained — a link, video, article, post, or other media captured for reference, analysis, or future connection"

  framework:
    grouping: "knowledge"
    description: "A structured intellectual model for understanding a domain — a set of principles, orders, or categories that organizes how you think about something; distinct from a document (not written content) and from an idea (not provisional or action-seeking)"

  pain-point:
    grouping: "knowledge"
    description: "A documented problem experienced by a user, customer, or market segment — captures what is broken, frustrating, or missing in existing solutions; shared across products and audiences"

  value-prop:
    grouping: "knowledge"
    description: "A benefit claim a product makes — what it delivers to an audience, often framed in response to a pain point; a proposition is only as strong as the pain points it addresses"

  audience:
    grouping: "knowledge"
    description: "A defined segment of people, roles, or organizations a product or message targets; shared across products and pain points"

  principle:
    grouping: "knowledge"
    description: "A standing decision that governs future work — settled, authoritative, and durable; distinct from idea (provisional, action-seeking) and framework (a model for thinking about something, not a governing rule)"

  meeting:
    grouping: "events"
    description: "An intentional gathering of participants (human or agent) to discuss and produce outcomes; scheduled or ad hoc"

  correspondence:
    grouping: "logs"
    description: "An external communication sent or received — emails, LinkedIn messages, and other exchanges with people outside Substrate. Tracks direction, channel, participants, and context."

  article:
    grouping: "artifacts"
    description: "A produced piece of written content intended for publication; the output side of the consumption/production divide"

  script:
    grouping: "artifacts"
    description: "A structured outline or script for video/audio content"

  product:
    grouping: "artifacts"
    description: "A persistent thing you build, ship, and maintain; projects revolve around products, but products are objects through and through"

  build:
    grouping: "artifacts"
    description: "A codebase or deployable artifact with its own repo and development lifecycle"

  resume:
    grouping: "artifacts"
    description: "A personal professional document produced in multiple formats (Markdown, HTML, PDF), tailored per audience. The canonical resume is the source; all others derive from it."

  video:
    grouping: "artifacts"
    description: "A produced video published or shared externally — a YouTube upload, a demo recording, a promotional clip. The published work, not the file; binary files are separate asset entities linked via uses/used_in."

  invoice:
    grouping: "deliverables"
    description: "A formal payment request issued to an external party; tracks delivery and payment state"

  receipt:
    grouping: "deliverables"
    description: "A payment confirmation or acknowledgment document; tracks delivery state"

  tool:
    grouping: "resources"
    description: "An external software tool, service, or platform used in building or operating — defined by its functional role, not its form"

  job-opportunity:
    grouping: "opportunities"
    description: "A tracked external job pursuit — from initial discovery through application, interview, and outcome. Linked to an organization, may contain tailored resumes and application materials."

  logo:
    grouping: "asset"
    description: "A brand logo file — vector or raster, canonical or variant"

  signature:
    grouping: "asset"
    description: "A personal signature image used for signing documents, cover letters, and correspondence"

  video-file:
    grouping: "asset"
    description: "A video binary (MP4, MOV, WebM) stored in assets/. The file, not the published work. Linked to artifact entities via uses/used_in."

  thumbnail:
    grouping: "asset"
    description: "A preview or cover image for another entity. Linked to the entity it represents via uses/used_in."

  audio-file:
    grouping: "asset"
    description: "An audio binary (MP3, WAV, FLAC) stored in assets/. Linked to artifact entities via uses/used_in."

  photo:
    grouping: "asset"
    description: "A photograph or image capture stored in assets/. Linked to related entities via uses/used_in."

groupings:
  actions:
    description: "Atomic work items"
    nature: ["work"]
    types: ["task", "ticket", "chore"]

  efforts:
    description: "Bounded efforts with outcomes"
    nature: ["work"]
    types: ["project", "workstream", "incident"]

  horizons:
    description: "Where you're aiming — destinations that orient work, not work items themselves"
    nature: ["object"]
    types: ["pillar", "mission", "milestone"]

  planning:
    description: "Knowledge artifacts produced through deliberation — questions, ideas, and conclusions"
    nature: ["object"]
    types: ["inquiry", "idea", "decision"]

  utility:
    description: "Active mechanisms that serve the system — configured artifacts, not pipeline items"
    nature: ["object"]
    types: ["trigger", "skill", "context-doc"]

  actors:
    description: "Who can take action"
    nature: ["object"]
    types: ["person", "user", "agent", "organization"]

  knowledge:
    description: "Information to retain — consumed or referenced"
    nature: ["object"]
    types: ["note", "document", "reference", "quote", "framework", "pain-point", "value-prop", "audience", "principle"]

  artifacts:
    description: "Tangible outputs — produced and shipped"
    nature: ["object"]
    types: ["article", "script", "product", "build", "resume", "video"]

  events:
    description: "Time-bound occurrences"
    nature: ["object"]
    # Meetings resolve, but cadences persist
    types: ["meeting"]

  logs:
    description: "Observations over time"
    nature: ["object"]
    types: ["correspondence"]

  deliverables:
    description: "Things issued to an external party in expectation of a formal acknowledgment — payment, signature, or receipt confirmation. Distinct from artifacts (internal outputs) and documents (the Substrate knowledge type)."
    nature: ["object"]
    types: ["invoice", "receipt"]

  resources:
    description: "External tools, services, and platforms drawn on to do work — capabilities you use, not produce"
    nature: ["object"]
    types: ["tool"]

  opportunities:
    description: "External-facing pursuits tracked through a progression funnel — jobs, clients, business deals. Objects with stage-based lifecycles driven by external counterparties."
    nature: ["object"]
    types: ["job-opportunity"]

  asset:
    description: "Large binary file entities (images, audio, video) — stored in the gitignored assets/ folder, not in entity folders"
    nature: ["object"]
    types: ["logo", "signature", "video-file", "thumbnail", "audio-file", "photo"]

# Governance guidance:
# Creating New Types — consider:
#   1. Does an existing type fit? Types can have flexible attributes.
#   2. Is this truly a different kind of thing, or just a variant?
#   3. What grouping does it belong to?
# Creating New Groupings:
#   Groupings should be rare. They represent fundamentally different categories of being.
# Custom Status Dimensions:
#   Default to grouping-level: one dimension covering all types in the grouping with shared
#   vocabulary. Check academically — would the status categories and their values apply
#   sensibly across every type in the grouping? If yes, define at grouping level.
#   If the vocabulary genuinely doesn't map across the grouping, define at type level.
#   All custom status dimensions must end in _status (e.g., pipeline_status, approval_status).
#   See attributes.yaml for the access model.
